  <script>
    function logout() {
      localStorage.removeItem("isLoggedIn");
      window.location.href = "/login/";
    }

    function scrollToTop() {
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function toggleMenu() {
      const menu = document.querySelector('header.top-nav .menu');
      if (menu) {
        menu.classList.toggle('show');
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      const uploadInput = document.getElementById('pdf-upload-input');
      const uploadBtn = document.getElementById('pdf-upload-btn');
      const typeSelect = document.getElementById('file-type-select');
      const categorySelect = document.getElementById('category-select');
      const studyPanel = document.getElementById('study-main-panel');
      const studyMainBtn = document.getElementById('study-main-btn');
      const sidebarStudyTitle = document.getElementById('sidebar-study-title');
      const viewer = document.getElementById('study-viewer');
      const viewerImg = document.getElementById('study-viewer-img');
      const viewerTitle = document.getElementById('study-viewer-title');
      const viewerPrev = document.getElementById('study-viewer-prev');
      const viewerNext = document.getElementById('study-viewer-next');
      const viewerClose = document.getElementById('study-viewer-close');

      const studyFilesMap = {};
      let currentCategory = null;
      let currentIndex = 0;

      const CATEGORY_CONFIG = [
        { key: 'bcs', label: '标初上' },
        { key: 'bcx', label: '标初下' },
        { key: 'bzs', label: '标中上' },
        { key: 'bzx', label: '标中下' },
        { key: 'bgs', label: '标高上' },
        { key: 'bgx', label: '标高下' }
      ];

      function getListEl(key) {
        return document.getElementById('study-' + key);
      }

      function getMainListEl(key) {
        return document.getElementById('study-main-' + key);
      }

      function updateAccept() {
        if (!uploadInput || !typeSelect) return;
        if (typeSelect.value === 'image') {
          uploadInput.accept = 'image/*';
        } else {
          uploadInput.accept = 'application/pdf';
        }
      }

      function isLocalhost() {
        return (
          location.hostname === 'localhost' ||
          location.hostname === '127.0.0.1' ||
          location.hostname === ''
        );
      }

      async function fetchStudyList(catKey) {
        if (!isLocalhost()) {
          try {
            const apiRes = await fetch('/api/study-list?category=' + encodeURIComponent(catKey));
            if (apiRes.ok) {
              const apiData = await apiRes.json();
              if (Array.isArray(apiData.files)) {
                return apiData.files;
              }
            }
          } catch (e) {
          }
        }

        try {
          const ghRes = await fetch(
            'https://api.github.com/repos/Sun1105/hexo-source/contents/source/study/' + catKey
          );
          if (!ghRes.ok) {
            return [];
          }
          const ghData = await ghRes.json();
          return Array.isArray(ghData) ? ghData : [];
        } catch (e) {
          return [];
        }
      }

      async function loadResources() {
        for (const cat of CATEGORY_CONFIG) {
          const sideList = getListEl(cat.key);
          const mainList = getMainListEl(cat.key);

          if (sideList) {
            sideList.innerHTML = '<li>加载中...</li>';
          }
          if (mainList) {
            mainList.innerHTML = '<li>加载中...</li>';
          }

          const list = await fetchStudyList(cat.key);
          const files = Array.isArray(list)
            ? list.filter(file => file.name && /\.(pdf|png|jpe?g|gif|webp|svg)$/i.test(file.name))
            : [];

          studyFilesMap[cat.key] = files;

          if (!files.length) {
            if (sideList) sideList.innerHTML = '<li>暂无文件</li>';
            if (mainList) mainList.innerHTML = '<li>暂无文件</li>';
            continue;
          }

          const parts = files.map((file, index) => {
            const href =
              file.download_url ||
              file.html_url ||
              (file.path ? '/' + file.path.replace(/^source\//, '') : '#');
            return (
              '<li>' +
                '<a href="' + href + '" target="_blank" class="study-file-link" data-category="' +
                cat.key + '" data-index="' + index + '">' +
                  '<span class="sidebar-name">' + file.name + '</span>' +
                '</a>' +
              '</li>'
            );
          });

          if (sideList) {
            sideList.innerHTML = parts.join('');
            bindStudyLinks(sideList);
          }
          if (mainList) {
            mainList.innerHTML = parts.join('');
            bindStudyLinks(mainList);
          }
        }
      }

      loadResources();

      if (typeSelect) {
        typeSelect.addEventListener('change', updateAccept);
        updateAccept();
      }

      function openViewer(category, index) {
        const list = studyFilesMap[category] || [];
        if (!list.length) return;

        if (index < 0) index = 0;
        if (index >= list.length) index = list.length - 1;

        const file = list[index];
        const href =
          file.download_url ||
          file.html_url ||
          (file.path ? '/' + file.path.replace(/^source\//, '') : '#');

        currentCategory = category;
        currentIndex = index;

        if (viewerImg) {
          viewerImg.src = href;
        }
        if (viewerTitle) {
          viewerTitle.textContent = file.name || '';
        }
        if (viewer) {
          viewer.style.display = 'flex';
        }

        if (viewerPrev) {
          viewerPrev.disabled = index <= 0;
        }
        if (viewerNext) {
          viewerNext.disabled = index >= list.length - 1;
        }
      }

      function closeViewer() {
        if (viewer) {
          viewer.style.display = 'none';
        }
      }

      function showOffset(delta) {
        if (!currentCategory) return;
        openViewer(currentCategory, currentIndex + delta);
      }

      function onStudyLinkClick(event) {
        if (!viewer || !viewerImg) return;
        event.preventDefault();
        const category = this.getAttribute('data-category');
        const index = parseInt(this.getAttribute('data-index'), 10) || 0;
        openViewer(category, index);
      }

      function bindStudyLinks(container) {
        const links = container.querySelectorAll('a.study-file-link');
        links.forEach(link => {
          link.addEventListener('click', onStudyLinkClick);
        });
      }

      function showStudyPanel() {
        if (!studyPanel) return;
        const main = document.getElementById('main-content');
        if (main) {
          const children = Array.from(main.children);
          children.forEach(child => {
            if (child.id === 'study-main-panel') {
              child.style.display = 'block';
            } else {
              child.style.display = 'none';
            }
          });
          main.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
      }

      if (studyMainBtn) {
        studyMainBtn.addEventListener('click', () => {
          showStudyPanel();
          loadResources();
        });
      }

      // 左侧“学习资料”标题只负责展开侧边栏，不再强制切换主内容

      const groupTitles = document.querySelectorAll('.study-group-title');
      groupTitles.forEach(title => {
        const group = title.parentElement;
        const list = group.querySelector('ul');
        if (!list) return;
        title.addEventListener('click', () => {
          group.classList.toggle('collapsed');
        });
      });

      if (uploadBtn && uploadInput) {
        uploadBtn.addEventListener('click', () => {
          if (!uploadInput.files || !uploadInput.files.length) {
            alert('请选择要上传的文件');
            return;
          }

          const files = Array.from(uploadInput.files);
          const type = typeSelect ? typeSelect.value : 'pdf';
          const category = categorySelect ? categorySelect.value : 'bcs';

          const invalid = files.some(file => {
            if (type === 'pdf') {
              return !file.name.toLowerCase().endsWith('.pdf');
            }
            if (type === 'image') {
              return !file.type.startsWith('image/');
            }
            return true;
          });

          if (invalid) {
            if (type === 'pdf') {
              alert('仅支持扩展名为 .pdf 的文件');
            } else if (type === 'image') {
              alert('仅支持图片文件');
            } else {
              alert('文件类型不支持');
            }
            return;
          }

          uploadBtn.disabled = true;
          uploadBtn.textContent = '上传中...';

          let successCount = 0;
          let failCount = 0;

          function uploadAt(index) {
            if (index >= files.length) {
              const message = '上传完成：成功 ' + successCount + ' 个，失败 ' + failCount + ' 个';
              alert(message);
              uploadInput.value = '';
              loadResources();
              uploadBtn.disabled = false;
              uploadBtn.textContent = '上传文件';
              return;
            }

            const file = files[index];
            const reader = new FileReader();

            reader.onload = event => {
              (async () => {
                try {
                  const arrayBuffer = event.target.result;
                  const bytes = new Uint8Array(arrayBuffer);
                  let binary = '';
                  for (let i = 0; i < bytes.byteLength; i++) {
                    binary += String.fromCharCode(bytes[i]);
                  }
                  const base64 = btoa(binary);

                  const res = await fetch('/api/upload-pdf', {
                    method: 'POST',
                    headers: {
                      'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                      filename: file.name,
                      content: base64,
                      type,
                      category
                    })
                  });

                  if (res.ok) {
                    successCount += 1;
                  } else {
                    try {
                      const errData = await res.json();
                      if (errData && errData.error) {
                        console.error('上传失败', file.name, errData.error);
                      }
                    } catch (e2) {}
                    failCount += 1;
                  }
                } catch (e) {
                  failCount += 1;
                } finally {
                  uploadAt(index + 1);
                }
              })();
            };

            reader.onerror = () => {
              failCount += 1;
              uploadAt(index + 1);
            };

            reader.readAsArrayBuffer(file);
          }

          uploadAt(0);
        });
      }

      if (viewerClose) {
        viewerClose.addEventListener('click', () => {
          closeViewer();
        });
      }

      if (viewerPrev) {
        viewerPrev.addEventListener('click', () => {
          showOffset(-1);
        });
      }

      if (viewerNext) {
        viewerNext.addEventListener('click', () => {
          showOffset(1);
        });
      }

      if (viewer) {
        viewer.addEventListener('click', event => {
          if (event.target === viewer) {
            closeViewer();
          }
        });
      }

      document.addEventListener('keydown', event => {
        if (!viewer || viewer.style.display === 'none') return;
        if (event.key === 'Escape') {
          closeViewer();
        } else if (event.key === 'ArrowLeft') {
          showOffset(-1);
        } else if (event.key === 'ArrowRight') {
          showOffset(1);
        }
      });
    });
  </script>

          const content = block.textContent;
          const pre = block.parentElement;
          const div = document.createElement('div');
          div.className = 'mermaid';
          div.textContent = content;
          pre.parentNode.replaceChild(div, pre);
        });

        // 渲染
        await mermaid.run({
          querySelector: '.mermaid'
        });
      }
    });

  const owner = "Sun1105";              // GitHub 用户名
  const repo = "hexo-source";           // 仓库名
  const postsDir = "source/_posts";     // 文章目录
  let editingNote = null;               // 当前正在编辑的文章对象

  const editorModal = document.getElementById('editorModal');
  const noteTitle = document.getElementById('noteTitle');
  const noteFilename = document.getElementById('noteFilename');
  const noteCategory = document.getElementById('noteCategory');
  const noteTags = document.getElementById('noteTags');
  const noteContent = document.getElementById('noteContent');
  const saveNoteBtn = document.getElementById('saveNoteBtn');
  const cancelEditBtn = document.getElementById('cancelEditBtn');
  const previewDiv = document.getElementById('preview');

  // 渲染预览（含 Mermaid 支持）
  const renderPreview = async (content) => {
    const trimmed = content.trim();
    // 检测是否为完整 HTML 文档
    const isFullHtml = trimmed.match(/^\s*<!DOCTYPE/i) || trimmed.match(/^\s*<html/i);

    if (isFullHtml) {
        // 使用 iframe 渲染完整 HTML
        previewDiv.innerHTML = '<iframe id="previewFrame" style="width:100%; height:500px; border:1px solid #eee;"></iframe>';
        const frame = document.getElementById('previewFrame');
        if (frame) {
            const doc = frame.contentDocument || frame.contentWindow.document;
            doc.open();
            doc.write(content);
            doc.close();
        }
        return;
    }

    // Markdown 渲染
    previewDiv.innerHTML = marked.parse(content);

    if (window.mermaid) {
      const mermaidBlocks = previewDiv.querySelectorAll('code.language-mermaid');
      if (mermaidBlocks.length > 0) {
        mermaidBlocks.forEach(block => {
          const content = block.textContent;
          const pre = block.parentElement;
          const div = document.createElement('div');
          div.className = 'mermaid';
          div.textContent = content;
          if (pre && pre.parentNode) {
            pre.parentNode.replaceChild(div, pre);
          }
        });
        try {
          await window.mermaid.run({ querySelector: '#preview .mermaid' });
        } catch (e) {
          console.error("Mermaid render error:", e);
        }
      }
    }
  };

  // 暴露给全局的函数
  window.openEditor = async function(pathOrFile) {
    let file;
    
    if (!pathOrFile) {
        // 新建文章
        file = null;
    } else if (typeof pathOrFile === 'string') {
        // 如果传入的是字符串（路径），则获取文件信息
        let cleanPath = pathOrFile.replace(/\\/g, '/'); // 确保是正斜杠
        if (!cleanPath.startsWith('source/')) {
            cleanPath = 'source/' + cleanPath;
        }
        
        // 处理中文路径
        const encodedPath = cleanPath.split('/').map(encodeURIComponent).join('/');

        try {
            console.log(`正在获取文件信息: ${encodedPath}`);
            const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${encodedPath}`);
            if (!res.ok) {
                const errText = await res.text();
                throw new Error(`无法获取文件信息 (Status: ${res.status}): ${errText}`);
            }
            file = await res.json();
        } catch (e) {
            console.error(e);
            alert('获取文件失败: ' + e.message + '\n请检查控制台 (F12) 获取更多信息。');
            return;
        }
    } else {
        file = pathOrFile;
    }

    editingNote = file;
    editorModal.style.display = "block";

    if (!file) {
        // 新建模式
        noteTitle.value = "";
        noteFilename.value = "source/_posts/" + Date.now() + ".md"; // 默认文件名
        noteCategory.value = "";
        noteTags.value = "";
        noteContent.value = "";
        previewDiv.innerHTML = "";
        document.getElementById('editorTitle').innerText = "新建文章";
        return;
    }

    // 编辑模式
    document.getElementById('editorTitle').innerText = "编辑文章";
    noteTitle.value = "加载中...";
    noteFilename.value = file.path || ""; // 填充文件路径
    noteContent.value = "加载中...";

    try {
      // 获取文件内容
      let content = "";
      if (file.content && file.encoding === 'base64') {
          // 使用 TextDecoder 处理 UTF-8 字符，比 escape/decodeURIComponent 更现代且稳健
          try {
              const binaryString = window.atob(file.content.replace(/\n/g, ""));
              const bytes = new Uint8Array(binaryString.length);
              for (let i = 0; i < binaryString.length; i++) {
                  bytes[i] = binaryString.charCodeAt(i);
              }
              content = new TextDecoder('utf-8').decode(bytes);
          } catch (e) {
              console.warn("TextDecoder failed, falling back to legacy decode:", e);
              content = decodeURIComponent(escape(window.atob(file.content.replace(/\n/g, ""))));
          }
      } else if (file.download_url) {
          // 文件较大时（>1MB），API 不返回 content，需从 download_url 获取
          console.log("File content too large, fetching from download_url...");
          const rawRes = await fetch(file.download_url);
          if (!rawRes.ok) {
              throw new Error(`无法从 download_url 获取内容: ${rawRes.status}`);
          }
          content = await rawRes.text();
      } else {
          // 兜底：如果 API 返回结构不符合预期
          if (file.content) {
             // 非 base64 编码？直接使用
             content = file.content;
          } else {
             throw new Error("未找到文件内容 (No content field and no download_url)");
          }
      }

      // 解析Front Matter
      // 使用 js-yaml 解析
      const parts = content.split(/^---$/m);
      if (parts.length >= 3) {
        const frontMatterRaw = parts[1];
        const body = parts.slice(2).join('---').trim();
        
        try {
            const frontMatter = jsyaml.load(frontMatterRaw);
            
            // 标题
            noteTitle.value = frontMatter.title || "";
            
            // 分类
            if (frontMatter.categories) {
                if (Array.isArray(frontMatter.categories)) {
                    // 如果是数组，展平并用逗号分隔
                    noteCategory.value = frontMatter.categories.flat().join(", ");
                } else {
                    noteCategory.value = frontMatter.categories;
                }
            } else if (frontMatter.category) {
                 // 兼容 category 字段
                 if (Array.isArray(frontMatter.category)) {
                    noteCategory.value = frontMatter.category.flat().join(", ");
                } else {
                    noteCategory.value = frontMatter.category;
                }
            } else {
                noteCategory.value = "";
            }

            // 标签
            if (frontMatter.tags) {
                if (Array.isArray(frontMatter.tags)) {
                    noteTags.value = frontMatter.tags.flat().join(", ");
                } else {
                    noteTags.value = frontMatter.tags;
                }
            } else {
                noteTags.value = "";
            }

        } catch (e) {
            console.error("YAML parsing error:", e);
            alert("YAML 解析失败，请手动检查 Front Matter 格式");
        }

        noteContent.value = body;
        renderPreview(body);

      } else {
        // 没有Front Matter
        noteTitle.value = file.name.replace(/\.md$/, '');
        noteContent.value = content;
        renderPreview(content);
      }

    } catch (e) {
      console.error(e);
      noteContent.value = "读取内容失败: " + e.message;
    }
  };

  // 监听输入，实时预览
  noteContent.addEventListener('input', () => {
    renderPreview(noteContent.value);
  });

  // 关闭
  cancelEditBtn.onclick = () => {
    editorModal.style.display = "none";
    editingNote = null;
  };

  // 点击外部关闭
  window.onclick = (event) => {
    if (event.target == editorModal) {
      editorModal.style.display = "none";
      editingNote = null;
    }
  };

  // 保存
  saveNoteBtn.onclick = async () => {
    const title = noteTitle.value.trim();
    const content = noteContent.value;
    const categories = noteCategory.value.trim();
    const tags = noteTags.value.trim();
    let filepath = noteFilename.value.trim();

    if (!title) {
      alert("请输入标题");
      return;
    }
    
    if (!filepath) {
        alert("请输入文件路径");
        return;
    }
    
    // 确保路径以 source/ 开头 (可选，视需求而定，Hexo通常在source下)
    if (!filepath.startsWith('source/')) {
        filepath = 'source/' + filepath;
    }
    // 确保以 .md 结尾
    if (!filepath.endsWith('.md')) {
        filepath += '.md';
    }

    // 构造新的文件内容（含 Front Matter）
    let newFileContent = "---\n";
    newFileContent += `title: ${title}\n`;
    newFileContent += `date: ${new Date().toISOString()}\n`;
    if (categories) newFileContent += `categories: [${categories}]\n`;
    if (tags) newFileContent += `tags: [${tags}]\n`;
    newFileContent += "---\n\n";
    newFileContent += content;

    // Base64 编码
    // const contentBase64 = window.btoa(unescape(encodeURIComponent(newFileContent)));
    // API 期望直接的字符串，它会在后端进行 Base64 编码
    
    const sha = editingNote ? editingNote.sha : null;
    // const path = editingNote ? editingNote.path : `source/_posts/${Date.now()}-${title}.md`;
    
    // 使用用户指定的文件路径
    // 注意：如果是重命名（修改了路径），sha 应该为 null（视为新文件），或者后端支持移动操作
    // 这里简化处理：如果路径变了，就视为创建新文件。旧文件依然存在（除非后端有处理逻辑）。
    // 真正的重命名需要 delete old + create new
    
    const isRename = editingNote && (editingNote.path !== filepath);
    const finalSha = isRename ? null : sha; 
    
    const payload = {
        path: filepath,
        message: sha ? `Update ${title}` : `Create ${title}`,
        content: newFileContent, // 直接发送内容，后端处理 Base64
        sha: finalSha
    };

    // 决定调用哪个后端 API (本地代理)
    // 注意：这里我们调用本地的 Serverless Function 或者 Next.js API 路由
    // 如果是纯 Hexo 静态站，通常没有后端。
    // 但用户之前的 new-note.js 暗示了有 Vercel API 支持。
    // 我们需要确认 API 路径。根据之前的分析，API 在 api/ 目录下。
    // Vercel 会将 api/ 目录下的文件部署为 Serverless Functions。
    // 假设路径是 /api/new-note 和 /api/edit-note

    // 修复：如果是重命名（isRename=true）或者新建文件（!editingNote），finalSha 为 null
    // 此时应该调用 /api/new-note，而不是 /api/edit-note
    const apiUrl = finalSha ? '/api/edit-note' : '/api/new-note';

    saveNoteBtn.disabled = true;
    saveNoteBtn.innerText = "保存中...";

    try {
        const res = await fetch(apiUrl, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(payload)
        });

        const data = await res.json();
        
        if (res.ok) {
            alert("保存成功！即将刷新...");
            location.reload();
        } else {
            alert("保存失败: " + (data.error || JSON.stringify(data)));
        }
    } catch (e) {
        console.error(e);
        alert("请求失败: " + e.message);
    } finally {
        saveNoteBtn.disabled = false;
        saveNoteBtn.innerText = "💾 保存";
    }
  };
})();
</script>
</body>
</html>
